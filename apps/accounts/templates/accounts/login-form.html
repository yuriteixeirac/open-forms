{% extends 'base.html' %}

{% block title%}Login{% endblock%}
{% block head %}
{% load static %}
<link rel="stylesheet" href="{% static 'style/auth.css' %}">
{% endblock %}

{% block main %}
<div class="login-card">
    <div class="card-header">
        <h1>Sign in</h1>
        <p>Fill in the details below to get started.</p>
    </div>

    <form action="{% url 'login-view' %}" method="post" class="form-fields">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="submit-btn">Login →</button>
    </form>

    <p class="register-link">Don't have an account yet? <a href="{% url 'register-view' %}">Sign up</a></p>
</div>
{% endblock %}
