<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>OpenForms | Login</title>
    </head>
    <body>
        <form action="{% url 'login-view' %}" method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="field-wrapper">
                    {{ field.label }}
                    {{ field }}
                    {% if field.errors %}
                        {{ field.errors }}
                    {% endif %}
                </div>
            {% endfor %}

            {% if form.non_field_errors %}
            <div class="non-field-errors"></div>
                <ul>
                    {% for error in form.non_field_errors %}
                        <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
            <button type="submit">Enviar</button>
        </form>
    </body>
</html>
